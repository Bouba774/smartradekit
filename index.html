  <body>
    <!-- Splash screen with app logo and loading indicator -->
    <div id="initial-loader" style="position: fixed; inset: 0; background: #0a1929; z-index: 99999; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden;">
      <img src="./assets/app-logo.png" alt="Smart Trade Kit" style="width: 120px; height: 120px; border-radius: 24px; object-fit: contain;" />
      <p style="color: #ffffff; font-size: 20px; font-weight: 700; margin-top: 20px; letter-spacing: 0.5px;">Smart Trade Kit</p>
      <p id="splash-tagline" style="color: rgba(255,255,255,0.6); font-size: 13px; margin-top: 8px; font-style: italic; letter-spacing: 0.3px;">Your Ultimate Trading Companion</p>
      <div style="position: absolute; bottom: 48px; display: flex; flex-direction: column; align-items: center; gap: 12px;">
        <div style="width: 32px; height: 32px; border: 3px solid rgba(255,255,255,0.15); border-top-color: #3b82f6; border-radius: 50%; animation: spin 0.8s linear infinite;"></div>
        <p style="color: rgba(255,255,255,0.5); font-size: 12px;">Loading...</p>
      </div>
    </div>
    <style>@keyframes spin { to { transform: rotate(360deg); } }</style>
    <script>
      (function() {
        var taglines = {
          en: 'Your Ultimate Trading Companion',
          fr: 'Votre Compagnon de Trading Ultime',
          es: 'Tu Compañero de Trading Definitivo',
          pt: 'Seu Companheiro de Trading Definitivo',
          de: 'Ihr Ultimativer Trading-Begleiter',
          ar: 'رفيقك المثالي في التداول',
          tr: 'Nihai Trading Yoldaşınız',
          it: 'Il Tuo Compagno di Trading Definitivo'
        };
        var loadingTexts = {
          en: 'Loading...', fr: 'Chargement...', es: 'Cargando...', pt: 'Carregando...',
          de: 'Laden...', ar: '...جار التحميل', tr: 'Yükleniyor...', it: 'Caricamento...'
        };
        var lang = (localStorage.getItem('language') || navigator.language?.slice(0,2) || 'en');
        var el = document.getElementById('splash-tagline');
        if (el && taglines[lang]) el.textContent = taglines[lang];
        var loader = document.querySelector('#initial-loader p:last-of-type');
        if (loader && loadingTexts[lang]) loader.textContent = loadingTexts[lang];
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="./src/main.tsx"></script>
    <script>
      window.hideInitialLoader = function() {
        var loader = document.getElementById('initial-loader');
        if (loader && loader.style.display !== 'none') {
          loader.style.opacity = '0';
          loader.style.transition = 'opacity 0.2s ease-out';
          setTimeout(function() { loader.style.display = 'none'; }, 200);
        }
      };
      window.addEventListener('app-ready', window.hideInitialLoader);
      setTimeout(window.hideInitialLoader, 6000);
    </script>
