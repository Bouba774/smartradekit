name: Build Smart Trade Kit APK (Signed)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java 17
        uses: actions/setup-java@v3
        with:
          java-version: 17
          distribution: temurin

      # Install npm dependencies (legacy-peer-deps for jspdf conflicts)
      - name: Install NPM Dependencies
        run: npm install --legacy-peer-deps

      # Build web app into dist/
      - name: Build Web
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}

      # Add Android platform via Capacitor
      - name: Add Android Platform
        run: npx cap add android || echo "Android platform already exists"

      # Sync web assets to native android project
      - name: Capacitor Sync
        run: npx cap sync android

      # Force Gradle to use Java 17
      - name: Configure Gradle
        run: |
          echo "org.gradle.java.home=$JAVA_HOME" >> android/gradle.properties
          echo "android.useAndroidX=true" >> android/gradle.properties

      # Generate debug keystore for signing
      - name: Generate Keystore
        run: |
          cd android
          keytool -genkey -v \
            -keystore release.keystore \
            -storepass SmartTradeKit2026 \
            -alias smarttradekit \
            -keypass SmartTradeKit2026 \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Smart Trade Kit, OU=Mobile, O=SmartTradeKit, L=Paris, S=IDF, C=FR"

      # Inject signing config into app/build.gradle using Python for reliability
      - name: Configure Signing
        run: |
          python3 << 'EOF'
          with open("android/app/build.gradle", "r") as f:
              content = f.read()
          
          # Insert signingConfigs block before buildTypes
          signing_block = """    signingConfigs {
        release {
            storeFile file("../release.keystore")
            storePassword "SmartTradeKit2026"
            keyAlias "smarttradekit"
            keyPassword "SmartTradeKit2026"
        }
    }

"""
          content = content.replace("    buildTypes {", signing_block + "    buildTypes {")
          
          # Add signingConfig inside buildTypes > release (NOT signingConfigs > release)
          # Target "release {" that comes AFTER "buildTypes {"
          bt_idx = content.index("buildTypes {")
          release_idx = content.index("release {", bt_idx)
          content = content[:release_idx] + "release {\n            signingConfig signingConfigs.release\n" + content[release_idx + len("release {"):]
          
          with open("android/app/build.gradle", "w") as f:
              f.write(content)
          
          print("Signing config injected successfully")
          EOF

      # Build signed APK
      - name: Build Release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      # Upload APK artifact
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SmartTradeKit-APK
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
