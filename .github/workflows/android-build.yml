name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout du repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Installer Node.js (version >=22 pour Capacitor)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # 3️⃣ Installer les dépendances avec gestion des peer deps
      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      # 4️⃣ Build du projet
      - name: Build Project
        run: npm run build

      # 5️⃣ Synchroniser Capacitor
      - name: Capacitor Sync
        run: npx cap sync

      # 6️⃣ Ajouter la plateforme Android si nécessaire
      - name: Add Android Platform
        run: npx cap add android || echo "Android platform already added"

      # 7️⃣ Construire l’APK (Release)
      - name: Assemble APK
        run: |
          cd android
          ./gradlew assembleRelease

      # 8️⃣ Récupérer l’APK et le mettre en artifact
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SmartTradeKit-APK
          path: android/app/build/outputs/apk/release/app-release.apk