name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Récupérer le code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2️⃣ Installer Node.js 22 (Capacitor compatible)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # 3️⃣ Installer Java 17 (LTS)
      - name: Setup Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      # 4️⃣ Installer les dépendances (résolution jspdf-autotable)
      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      # 5️⃣ Build web app
      - name: Build Web App
        run: npm run build

      # 6️⃣ Ajouter la plateforme Android si nécessaire
      - name: Add Android Platform
        run: |
          npx cap add android || echo "Android platform already added"

      # 7️⃣ Sync Capacitor
      - name: Capacitor Sync
        run: npx cap sync

      # 8️⃣ Build APK Release
      - name: Build Android APK
        run: |
          cd android
          ./gradlew assembleRelease
          cd ..

      # 9️⃣ Upload APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SmartTradeKit-APK
          path: android/app/build/outputs/apk/release/app-release.apk