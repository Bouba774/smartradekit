name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Récupérer le code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2️⃣ Configurer Node.js 22
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # 3️⃣ Installer les dépendances (résoudre conflits jspdf-autotable)
      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      # 4️⃣ Build de l'application web
      - name: Build Web App
        run: npm run build

      # 5️⃣ Ajouter la plateforme Android si elle n'existe pas
      - name: Add Android Platform
        run: |
          npx cap add android || echo "Android platform already added"

      # 6️⃣ Sync Capacitor
      - name: Capacitor Sync
        run: npx cap sync

      # 7️⃣ Build Android APK
      - name: Build Android APK
        run: |
          cd android
          ./gradlew assembleDebug
          cd ..

      # 8️⃣ Upload de l'APK comme artefact
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SmartTradeKit-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk