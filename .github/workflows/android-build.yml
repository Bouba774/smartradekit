name: Build Smart Trade Kit APK (Signed)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java 17
        uses: actions/setup-java@v3
        with:
          java-version: 17
          distribution: temurin

      # Install npm dependencies (legacy-peer-deps for jspdf conflicts)
      - name: Install NPM Dependencies
        run: npm install --legacy-peer-deps

      # Build web app into dist/
      - name: Build Web
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}

      # Add Android platform via Capacitor
      - name: Add Android Platform
        run: npx cap add android || echo "Android platform already exists"

      # Sync web assets to native android project
      - name: Capacitor Sync
        run: npx cap sync android

      # Force Gradle to use Java 17
      - name: Configure Gradle
        run: |
          echo "org.gradle.java.home=$JAVA_HOME" >> android/gradle.properties
          echo "android.useAndroidX=true" >> android/gradle.properties

      # Generate debug keystore for signing
      - name: Generate Keystore
        run: |
          cd android
          keytool -genkey -v \
            -keystore release.keystore \
            -storepass SmartTradeKit2026 \
            -alias smarttradekit \
            -keypass SmartTradeKit2026 \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Smart Trade Kit, OU=Mobile, O=SmartTradeKit, L=Paris, S=IDF, C=FR"

      # Debug: show generated build.gradle
      - name: Show build.gradle before patching
        run: cat android/app/build.gradle

      # Inject signing config into app/build.gradle
      - name: Configure Signing
        run: |
          python3 << 'PYEOF'
          import re

          with open("android/app/build.gradle", "r") as f:
              content = f.read()

          print("=== Original build.gradle ===")
          print(content[:500])

          # 1. Find buildTypes and inject signingConfigs block right before it
          bt_match = re.search(r'^(\s*)buildTypes\s*\{', content, re.MULTILINE)
          if not bt_match:
              raise Exception("Could not find buildTypes block in build.gradle")

          indent = bt_match.group(1)
          signing_block = (
              f"{indent}signingConfigs {{\n"
              f"{indent}    release {{\n"
              f"{indent}        storeFile file(\"../release.keystore\")\n"
              f"{indent}        storePassword \"SmartTradeKit2026\"\n"
              f"{indent}        keyAlias \"smarttradekit\"\n"
              f"{indent}        keyPassword \"SmartTradeKit2026\"\n"
              f"{indent}    }}\n"
              f"{indent}}}\n\n"
          )
          content = content[:bt_match.start()] + signing_block + content[bt_match.start():]

          # 2. Find the release block INSIDE buildTypes and add signingConfig
          # Re-search since content changed
          bt_match2 = re.search(r'buildTypes\s*\{', content)
          bt_pos = bt_match2.end()
          release_match = re.search(r'(release\s*\{)', content[bt_pos:])
          if not release_match:
              raise Exception("Could not find release block inside buildTypes")

          insert_pos = bt_pos + release_match.end()
          content = content[:insert_pos] + "\n" + indent + "    signingConfig signingConfigs.release" + content[insert_pos:]

          with open("android/app/build.gradle", "w") as f:
              f.write(content)

          print("=== Patched build.gradle ===")
          print(content[:800])
          print("\nSigning config injected successfully!")
          PYEOF

      # Build signed APK
      - name: Build Release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      # Upload APK artifact
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SmartTradeKit-APK
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
