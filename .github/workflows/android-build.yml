name: Build Smart Trade Kit APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  android-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      # Installer Node.js 22
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # Installer Java 17 (LTS)
      - name: Setup Java 17
        uses: actions/setup-java@v3
        with:
          java-version: 17
          distribution: temurin

      # Forcer Gradle à utiliser Java 17
      - name: Force Gradle Java Home
        run: echo "org.gradle.java.home=$JAVA_HOME" >> android/gradle.properties

      # Installer dépendances npm
      - name: Install NPM Dependencies
        run: npm install --legacy-peer-deps

      # Build web app
      - name: Build Web
        run: npm run build

      # Ajouter la plateforme Android si non présente
      - name: Add Android Platform
        run: npx cap add android || echo "Android platform already exists"

      # Sync Capacitor
      - name: Capacitor Sync
        run: npx cap sync

      # Build APK Release
      - name: Build APK
        run: |
          cd android
          ./gradlew assembleRelease
          cd ..

      # Upload APK généré
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SmartTradeKit-APK
          path: android/app/build/outputs/apk/release/app-release.apk