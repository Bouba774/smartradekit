name: Build Smart Trade Kit APK (Signed)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      # Node (pour Vite / Capacitor)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # ✅ FIX PRINCIPAL : Java 21
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install NPM Dependencies
        run: npm install --legacy-peer-deps

      - name: Build Web
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}

      - name: Add Android Platform
        run: npx cap add android || echo "Android platform already exists"

      - name: Capacitor Sync
        run: npx cap sync android

      - name: Configure Gradle
        run: |
          echo "org.gradle.java.home=$JAVA_HOME" >> android/gradle.properties
          echo "android.useAndroidX=true" >> android/gradle.properties
          echo "org.gradle.jvmargs=-Xmx4096m" >> android/gradle.properties

      # Génération du keystore
      - name: Generate Keystore
        run: |
          cd android
          keytool -genkey -v \
            -keystore release.keystore \
            -storepass SmartTradeKit2026 \
            -alias smarttradekit \
            -keypass SmartTradeKit2026 \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Smart Trade Kit, OU=Mobile, O=SmartTradeKit, L=Paris, S=IDF, C=FR"

      # Patch automatique du build.gradle pour signer l’APK
      - name: Configure Signing
        run: |
          python3 << 'PYEOF'
          import re

          path = "android/app/build.gradle"

          with open(path, "r") as f:
              content = f.read()

          if "signingConfigs" not in content:

              signing = """
      signingConfigs {
          release {
              storeFile file("../release.keystore")
              storePassword "SmartTradeKit2026"
              keyAlias "smarttradekit"
              keyPassword "SmartTradeKit2026"
          }
      }
              """

              content = re.sub(
                  r'android\s*\{',
                  'android {' + signing,
                  content,
                  count=1
              )

          if "signingConfig signingConfigs.release" not in content:

              content = re.sub(
                  r'release\s*\{',
                  'release {\n            signingConfig signingConfigs.release',
                  content,
                  count=1
              )

          with open(path, "w") as f:
              f.write(content)

          print("Signing configuration injected successfully")
          PYEOF

      # Compilation APK
      - name: Build Release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon --stacktrace

      # Upload APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SmartTradeKit-APK
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: erro